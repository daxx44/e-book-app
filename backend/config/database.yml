default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: ebook_library_development

test:
  <<: *default
  database: ebook_library_test

production:
  primary: &primary_production
    <<: *default
    database: ebook_library_production
    password: <%= ENV["DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: ebook_library_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: ebook_library_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: ebook_library_production_cable
    migrations_paths: db/cable_migrate
